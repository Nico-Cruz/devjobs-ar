<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>devjobs.ar — empleos tech Argentina</title>
  <meta name="description" content="Empleos tech en Argentina en tiempo real. React, Python, Node.js, Mobile y más. Sin registro, gratis." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #00C853;
      --bg: #0a0a0a;
      --surface: #111;
      --card: #161616;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.14);
      --text: #f0f0f0;
      --muted: #888;
      --hint: #555;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --radius: 10px;
    }

    body {
      font-family: var(--font-display);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container { max-width: 720px; margin: 0 auto; padding: 0 1rem 4rem; }

    /* HEADER */
    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 2rem 0 1.25rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
      gap: 12px;
      flex-wrap: wrap;
    }

    .logo {
      font-weight: 800;
      font-size: 24px;
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--accent); }

    .logo-sub {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--hint);
      margin-top: 4px;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
      background: rgba(0,200,83,0.07);
      border: 0.5px solid rgba(0,200,83,0.2);
      border-radius: 20px;
      padding: 5px 12px;
    }

    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 2s infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* SEARCH */
    .search-wrap {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .search-wrap input {
      flex: 1;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .search-wrap input:focus { border-color: var(--border-hover); }
    .search-wrap input::placeholder { color: var(--hint); }

    .btn {
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      padding: 10px 18px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.3px;
    }

    .btn:hover { opacity: 0.85; }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .chip {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 0.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .chip:hover, .chip.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    /* STATS */
    .stats {
      display: flex;
      gap: 16px;
      padding: 10px 0;
      margin-bottom: 1rem;
      border-bottom: 0.5px solid var(--border);
      flex-wrap: wrap;
    }

    .stat {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--hint);
    }

    .stat strong { color: var(--text); }

    /* JOBS */
    .jobs { display: flex; flex-direction: column; gap: 8px; }

    .job-card {
      display: block;
      text-decoration: none;
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      transition: border-color 0.15s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    .job-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      opacity: 0.3;
      transition: opacity 0.15s;
    }

    .job-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }

    .job-card:hover::before { opacity: 1; }

    .job-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 4px;
    }

    .job-title {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      line-height: 1.3;
    }

    .ext-icon {
      color: var(--hint);
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .job-company {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .salary {
      color: var(--accent);
      font-size: 11px;
      margin-left: 8px;
    }

    .job-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .tag {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 0.3px;
    }

    .tag-tech {
      background: rgba(0,200,83,0.08);
      color: var(--accent);
      border: 0.5px solid rgba(0,200,83,0.15);
    }

    .tag-remote {
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      border: 0.5px solid var(--border);
    }

    .tag-source {
      background: rgba(255,255,255,0.04);
      color: var(--hint);
      border: 0.5px solid var(--border);
    }

    .job-time {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--hint);
      margin-left: auto;
    }

    /* SKELETON */
    .skeleton {
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0%,100%{opacity:0.5} 50%{opacity:1}
    }

    .skel-line {
      background: var(--surface);
      border-radius: 4px;
      margin-bottom: 8px;
    }

    /* AD */
    .ad-slot {
      border: 0.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin: 1.25rem 0;
      text-align: center;
      background: var(--surface);
    }

    .ad-label {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--hint);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .ad-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .ad-sub {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--hint);
    }

    /* LOAD MORE */
    .load-more {
      width: 100%;
      margin-top: 1rem;
      padding: 12px;
      font-family: var(--font-mono);
      font-size: 12px;
      border: 0.5px dashed var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .load-more:hover {
      border-color: var(--border-hover);
      color: var(--text);
    }

    .error-msg {
      font-family: var(--font-mono);
      font-size: 12px;
      color: #e74c3c;
      text-align: center;
      padding: 2rem;
    }

    .empty {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--hint);
      text-align: center;
      padding: 3rem;
    }
  </style>
</head>
<body>
<div class="container">

  <header class="header">
    <div>
      <div class="logo">dev<span>jobs</span>.ar</div>
      <div class="logo-sub">empleos tech · argentina · tiempo real</div>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
  </header>

  <div class="search-wrap">
    <input type="text" id="search" placeholder="react, python, fullstack, empresa..." />
    <button class="btn" onclick="doSearch()">buscar</button>
  </div>

  <div class="filters" id="filters">
    <button class="chip active" data-filter="" onclick="setFilter('', this)">todos</button>
    <button class="chip" data-filter="react" onclick="setFilter('react', this)">react</button>
    <button class="chip" data-filter="python" onclick="setFilter('python', this)">python</button>
    <button class="chip" data-filter="node" onclick="setFilter('node', this)">node.js</button>
    <button class="chip" data-filter="mobile" onclick="setFilter('mobile', this)">mobile</button>
    <button class="chip" data-filter="devops" onclick="setFilter('devops', this)">devops</button>
    <button class="chip" data-filter="data" onclick="setFilter('data', this)">data</button>
    <button class="chip" data-filter="remote" onclick="setFilter('remote', this)">remoto</button>
  </div>

  <div class="filters" style="margin-top:-4px">
    <button class="chip src-btn active" onclick="setSource('all', this)">todas las fuentes</button>
    <button class="chip src-btn" onclick="setSource('getonboard', this)">getonboard</button>
    <button class="chip src-btn" onclick="setSource('rss', this)">rss feeds</button>
    <button class="chip src-btn" onclick="setSource('social', this)">linkedin · x posts</button>
  </div>

  <div class="stats">
    <div class="stat"><strong id="stat-total">—</strong> empleos</div>
    <div class="stat">actualizado <strong id="stat-time">—</strong></div>
    <div class="stat"><strong id="stat-sources">cargando...</strong></div>
  </div>

  <div class="jobs" id="jobs-container">
    <!-- Skeletons iniciales -->
    <div class="skeleton"><div class="skel-line" style="height:14px;width:60%"></div><div class="skel-line" style="height:12px;width:35%"></div><div class="skel-line" style="height:10px;width:80%"></div></div>
    <div class="skeleton"><div class="skel-line" style="height:14px;width:50%"></div><div class="skel-line" style="height:12px;width:40%"></div><div class="skel-line" style="height:10px;width:70%"></div></div>
    <div class="skeleton"><div class="skel-line" style="height:14px;width:65%"></div><div class="skel-line" style="height:12px;width:30%"></div><div class="skel-line" style="height:10px;width:75%"></div></div>
  </div>

  <div class="ad-slot">
    <div class="ad-label">publicidad</div>
    <div class="ad-title">¿Buscás contratar desarrolladores?</div>
    <div class="ad-sub">Contacto → hola@devjobs.ar</div>
  </div>

  <button class="load-more" id="load-more" onclick="loadMore()" style="display:none">
    cargar más empleos ↓
  </button>

</div>

<script>
  const SOURCES = {
    getonboard: '/api/jobs',
    rss: '/api/rss',
  };

  let allJobs = [];
  let gobPage = 1;
  let activeFilter = '';
  let activeSource = 'all';
  let searchQuery = '';
  let loading = false;

  async function fetchAll(reset = false) {
    if (loading) return;
    loading = true;
    if (reset) { gobPage = 1; allJobs = []; }

    showSkeletons();

    try {
      const [gobRes, rssRes, socialRes] = await Promise.allSettled([
        fetch(`/api/jobs?page=${gobPage}&per_page=20${searchQuery ? '&search='+encodeURIComponent(searchQuery) : '&category=programming'}`),
        fetch('/api/rss'),
        fetch('/api/social')
      ]);

      const gobJobs = gobRes.status === 'fulfilled' && gobRes.value.ok
        ? (await gobRes.value.json()).jobs || [] : [];

      const rssJobs = rssRes.status === 'fulfilled' && rssRes.value.ok
        ? (await rssRes.value.json()).jobs || [] : [];

      const socialJobs = socialRes.status === 'fulfilled' && socialRes.value.ok
        ? (await socialRes.value.json()).jobs || [] : [];

      const incoming = [...gobJobs, ...rssJobs, ...socialJobs];
      allJobs = reset ? incoming : [...allJobs, ...incoming];

      // Deduplicar
      const seen = new Set();
      allJobs = allJobs.filter(j => { if(seen.has(j.url)) return false; seen.add(j.url); return true; });

      // Ordenar por fecha
      allJobs.sort((a,b) => new Date(b.published_at) - new Date(a.published_at));

      gobPage++;
      render();
      updateStats();

      document.getElementById('load-more').style.display = gobJobs.length === 20 ? 'block' : 'none';

    } catch (err) {
      document.getElementById('jobs-container').innerHTML =
        `<div class="error-msg">Error cargando. Reintentando...<br><small>${err.message}</small></div>`;
      setTimeout(() => fetchAll(reset), 5000);
    } finally {
      loading = false;
    }
  }

  function showSkeletons() {
    document.getElementById('jobs-container').innerHTML = [1,2,3].map(() =>
      `<div class="skeleton"><div class="skel-line" style="height:14px;width:60%;margin-bottom:8px"></div><div class="skel-line" style="height:12px;width:35%;margin-bottom:8px"></div><div class="skel-line" style="height:10px;width:80%"></div></div>`
    ).join('');
  }

  function filterJobs(jobs) {
    return jobs.filter(job => {
      const matchSource = activeSource === 'all' || job.source === activeSource ||
        (activeSource === 'rss' && ['weworkremotely','remoteok'].includes(job.source)) ||
        (activeSource === 'social' && ['linkedin','x'].includes(job.source));
      if (!matchSource) return false;
      if (!activeFilter) return true;
      if (activeFilter === 'remote') return job.remote;
      const haystack = (job.title + ' ' + job.tags.join(' ')).toLowerCase();
      return haystack.includes(activeFilter);
    });
  }

  const sourceLabel = { getonboard:'GetOnBoard', linkedin:'LinkedIn', weworkremotely:'WWR', remoteok:'RemoteOK', x:'X post' };

  function render() {
    const container = document.getElementById('jobs-container');
    const jobs = filterJobs(allJobs);
    if (!jobs.length) {
      container.innerHTML = '<div class="empty">no se encontraron empleos con ese filtro</div>';
      return;
    }
    container.innerHTML = jobs.map(job => `
      <a class="job-card" href="${job.url}" target="_blank" rel="noopener noreferrer">
        <div class="job-top">
          <div class="job-title">${escHtml(job.title)}</div>
          <svg class="ext-icon" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </div>
        <div class="job-company">
          ${escHtml(job.company)}
          ${job.min_salary ? `<span class="salary">$${job.min_salary}–${job.max_salary}k</span>` : ''}
        </div>
        <div class="job-meta">
          <span class="tag tag-source">${sourceLabel[job.source] || job.source}</span>
          ${job.tags.slice(0,4).map(t => `<span class="tag tag-tech">${escHtml(t)}</span>`).join('')}
          ${job.remote ? '<span class="tag tag-remote">remoto</span>' : ''}
          <span class="job-time">${job.time}</span>
        </div>
      </a>
    `).join('');
  }

  function updateStats() {
    const jobs = filterJobs(allJobs);
    document.getElementById('stat-total').textContent = jobs.length;
    document.getElementById('stat-time').textContent = new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    const gobCount = allJobs.filter(j => j.source === 'getonboard').length;
    const rssCount = allJobs.filter(j => ['weworkremotely','remoteok'].includes(j.source)).length;
    const socialCount = allJobs.filter(j => ['linkedin','x'].includes(j.source)).length;
    document.getElementById('stat-sources').textContent = `GOB (${gobCount}) · RSS (${rssCount}) · Posts (${socialCount})`;
  }

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(); updateStats();
  }

  function setSource(s, btn) {
    activeSource = s;
    document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(); updateStats();
  }

  function doSearch() {
    searchQuery = document.getElementById('search').value.trim();
    fetchAll(true);
  }

  document.getElementById('search').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });

  function loadMore() { fetchAll(false); }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  fetchAll(true);
  setInterval(() => fetchAll(true), 5 * 60 * 1000);
</script>
</body>
</html>
